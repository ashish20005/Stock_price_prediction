<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stock Chat</title>
  <meta
    name="description"
    content="A minimal stock query interface inspired by modern conversational UI patterns."
  >
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <section class="chat-home" aria-label="Stock query interface">
      <div class="hero-copy">
        <h1>What are you working on?</h1>
      </div>

      <form class="composer" id="chatForm">
        <div class="composer-inner">
          <input
            id="chatInput"
            class="chat-input"
            type="text"
            name="query"
            placeholder="Ask about stocks..."
            autocomplete="off"
            aria-label="Ask about stocks"
          >
          <div class="composer-actions">
            <button class="icon-button" type="button" aria-label="Microphone">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 15.25a3.75 3.75 0 0 0 3.75-3.75V7a3.75 3.75 0 0 0-7.5 0v4.5A3.75 3.75 0 0 0 12 15.25Zm-5-3.75a.75.75 0 0 1 1.5 0 3.5 3.5 0 1 0 7 0 .75.75 0 0 1 1.5 0 4.99 4.99 0 0 1-4.25 4.93V19h2a.75.75 0 0 1 0 1.5h-5.5a.75.75 0 0 1 0-1.5h2v-2.57A4.99 4.99 0 0 1 7 11.5Z"/>
              </svg>
            </button>
            <button class="send-button" type="submit" aria-label="Send">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12.53 3.47a.75.75 0 0 0-1.06 0L5.97 8.97a.75.75 0 1 0 1.06 1.06l4.22-4.22V20a.75.75 0 0 0 1.5 0V5.81l4.22 4.22a.75.75 0 1 0 1.06-1.06l-5.5-5.5Z"/>
              </svg>
            </button>
          </div>
        </div>
      </form>

      <section class="messages" id="messages" aria-live="polite"></section>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
